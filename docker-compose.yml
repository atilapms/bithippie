services:
  postgres:
    image: postgres:16-alpine
    container_name: lab_experiment_db
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: lab_experiments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sh:/docker-entrypoint-initdb.d/init.sh
      - ./db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d lab_experiments"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
